<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Louis Desgrée - Software Engineer & Data Scientist. Python, JavaScript, ML. LVMH and Fendi alumni. UCLA Data Science (3.97 GPA). 135+ projects. Paris.">
  <title>Louis Desgrée</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">
</head>
<body>
  <svg style="position:absolute;width:0;height:0;overflow:hidden"><defs><filter id="grain-filter"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter></defs></svg>
  <a class="skip-link" href="#about-preview">Skip to content</a>
  <div class="grain-overlay" aria-hidden="true"></div>
  <canvas id="bg-canvas" aria-hidden="true"></canvas>

  <div class="dashboard">
    <div class="tile tile--name">
      <div class="name-left">
        <span class="name-title">LOUIS DESGR<span class="accent">É</span>E</span>
        <span class="name-subtitle" data-i18n="hero.subtitle">Computer Engineering · Data Science · Communication</span>
      </div>
      <div class="name-right">
        <span class="name-availability" data-i18n="hero.availability">Open to opportunities · Paris / Remote · March 2026</span>
        <button class="theme-toggle" id="theme-toggle" aria-label="Switch theme">
          <span class="theme-toggle-icon" id="theme-icon">&#9790;</span>
          <span id="theme-label">DARK</span>
        </button>
        <button class="lang-toggle" id="lang-toggle" aria-label="Switch language">
          <span class="lang-option active" data-lang="en">EN</span>
          <span class="lang-separator">/</span>
          <span class="lang-option" data-lang="fr">FR</span>
        </button>
      </div>
    </div>

    <div class="tile tile--about" data-expand="about" role="button" tabindex="0" aria-expanded="false">
      <div class="tile-label" data-i18n="nav.about">profile</div>
      <div class="tile-body" id="about-preview"></div>
    </div>

    <div class="tile tile--skills" role="region" aria-label="Skills visualization">
      <canvas id="skills-canvas" aria-hidden="true"></canvas>
      <div id="skills-tooltip" class="skills-tooltip"></div>
    </div>

    <!-- Skill detail card: outside tiles so it's never clipped -->
    <div id="skills-expanded-card" class="skills-expanded-card" aria-hidden="true"></div>

    <div class="tile tile--exp" data-expand="experience" role="button" tabindex="0" aria-expanded="false">
      <div class="tile-label" data-i18n="nav.experience">experience</div>
      <div class="tile-metric">6</div>
      <div class="tile-subtitle" id="exp-preview"></div>
      <div class="tile-footer" id="exp-footer"></div>
    </div>

    <div class="tile tile--projects" data-expand="projects" role="button" tabindex="0" aria-expanded="false">
      <div class="tile-label" data-i18n="nav.projects">projects</div>
      <div class="tile-metric">135+</div>
      <div class="tile-body" id="projects-preview"></div>
    </div>

    <div class="tile tile--edu" data-expand="education" role="button" tabindex="0" aria-expanded="false">
      <div class="tile-label" data-i18n="nav.education">education</div>
      <div class="tile-body" id="edu-preview"></div>
    </div>

    <div class="tile tile--contact">
      <div class="tile-label" data-i18n="nav.contact">contact</div>
      <div class="tile-body" id="contact-content"></div>
    </div>

    <div class="tile tile--news" data-expand="news" role="button" tabindex="0" aria-expanded="false">
      <div class="tile-label">NEWS & AI</div>
      <div class="tile-body" id="news-preview"></div>
    </div>

    <div class="tile tile--personal">
      <div class="tile-label">PERSONAL</div>
      <div class="tile-body" id="personal-content"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
